<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte de Networking - Conexiones de Valor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .passport-container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 30px;
            box-sizing: border-box;
            border-top: 8px solid #e01a83;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 5px;
        }
        .logo-container img {
            max-width: 85%;
            height: auto;
        }
        .passport-title {
            text-align: center;
            color: #e01a83;
            font-size: 1.6em;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .user-section {
            margin-bottom: 25px;
            background: #fcf8fa;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #e01a83;
        }
        .user-section label {
            display: block;
            font-size: 0.85em;
            color: #e01a83;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .user-section input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1.2em;
            color: #2d3748;
            font-weight: 600;
            padding: 5px 0;
            border-bottom: 2px solid #cbd5e0;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .user-section input:focus {
            border-bottom-color: #4ba340;
        }
        .progress-container {
            margin-bottom: 30px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 10px;
            height: 14px;
            width: 100%;
            overflow: hidden;
        }
        .progress {
            background-color: #4ba340;
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }
        .company-card {
            background: #f8fafc;
            border-left: 5px solid #cbd5e0;
            padding: 18px 15px;
            margin-bottom: 15px;
            border-radius: 0 12px 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .company-card.stamped {
            border-left-color: #4ba340;
            background: #f2fbf3;
        }
        .company-info h3 {
            margin: 0 0 5px 0;
            color: #1a202c;
            font-size: 1.05em;
        }
        .company-info small {
            background: #edf2f7;
            padding: 3px 8px;
            border-radius: 6px;
            color: #4a5568;
            font-weight: 500;
        }
        .stamp-badge {
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .badge-empty {
            background-color: #e01a83;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(224, 26, 131, 0.2);
        }
        .badge-empty:hover {
            background-color: #b81268;
            transform: translateY(-1px);
        }
        .badge-stamped {
            background-color: #4ba340;
            color: white;
            box-shadow: 0 4px 10px rgba(75, 163, 64, 0.2);
        }
        .sync-status {
            text-align: center;
            font-size: 0.8em;
            color: #a0aec0;
            margin-top: 10px;
        }
        .reset-btn {
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            text-decoration: underline;
            display: block;
            margin: 25px auto 0 auto;
            font-size: 0.85em;
            transition: color 0.2s;
        }
        .reset-btn:hover {
            color: #e53e3e;
        }
    </style>
</head>
<body>

<div class="passport-container">
    <div class="logo-container">
        <img src="logo.png" alt="Conexiones de Valor">
    </div>
    
    <div class="passport-title">Pasaporte Conexiones de Valor</div>
    
    <div class="user-section">
        <label for="attendee-name">Nombre del Portador</label>
        <input type="text" id="attendee-name" placeholder="Escribe tu nombre aquí..." onchange="saveName()">
    </div>
    
    <div class="progress-container">
        <div class="progress-label">
            <span>Progreso de tu ruta</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>
    </div>

    <div id="route-container">
        </div>

    <div class="sync-status" id="syncStatus">Conectado a la ruta oficial</div>
    <button class="reset-btn" onclick="resetPassport()">Reiniciar Pasaporte</button>
</div>

<script>
    // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT ENTRE LAS COMILLAS
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKLapmRoOlSFFwgmrBVLG_BKE7ETE9cCcbLhZSoGzYHn_PS2qRZ0mRR_pI0uWKfgZ6/exec";

    const companies = [
        { id: 1, name: "Empresa Alianza Estratégica", stand: "Stand 01" },
        { id: 2, name: "Innovación Digital Co.", stand: "Stand 02" },
        { id: 3, name: "Desarrollo Sostenible S.A.", stand: "Stand 03" },
        { id: 4, name: "Talento Global S.A.S.", stand: "Stand 04" }
    ];

    const SECRET_PIN = "1234"; 

    // Generar un identificador único para el teléfono de este asistente si no tiene uno
    if (!localStorage.getItem('passport_user_id')) {
        localStorage.setItem('passport_user_id', 'USER-' + Math.random().toString(36).substr(2, 9).toUpperCase());
    }
    const USER_ID = localStorage.getItem('passport_user_id');

    let stampedCompanies = JSON.parse(localStorage.getItem('stampedCompanies')) || [];
    document.getElementById('attendee-name').value = localStorage.getItem('attendeeName') || '';

    function saveName() {
        const name = document.getElementById('attendee-name').value;
        localStorage.setItem('attendeeName', name);
        syncDataWithCloud();
    }

    function renderPassport() {
        const container = document.getElementById('route-container');
        container.innerHTML = '';
        
        companies.forEach(company => {
            const isStamped = stampedCompanies.includes(company.id);
            
            const card = document.createElement('div');
            card.className = `company-card ${isStamped ? 'stamped' : ''}`;
            
            card.innerHTML = `
                <div class="company-info">
                    <h3>${company.name}</h3>
                    <small>${company.stand}</small>
                </div>
                <div>
                    ${isStamped 
                        ? `<span class="stamp-badge badge-stamped">✓ Sellado</span>` 
                        : `<span class="stamp-badge badge-empty" onclick="askForStamp(${company.id})">Sellar</span>`
                    }
                </div>
            `;
            container.appendChild(card);
        });

        updateProgress();
    }

    function askForStamp(companyId) {
        const pin = prompt("Ingrese el código de validación de la empresa:");
        if (pin === SECRET_PIN) {
            if (!stampedCompanies.includes(companyId)) {
                stampedCompanies.push(companyId);
                localStorage.setItem('stampedCompanies', JSON.stringify(stampedCompanies));
                renderPassport();
                syncDataWithCloud();
            }
        } else if (pin !== null) {
            alert("Código incorrecto. Solicita el código correcto al encargado del stand.");
        }
    }

    function updateProgress() {
        const percent = Math.round((stampedCompanies.length / companies.length) * 100);
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('progress-text').innerText = `${percent}%`;
    }

    // Función mágica que envía los datos a tu Google Sheet en tiempo real
    function syncDataWithCloud() {
        if (!WEB_APP_URL || WEB_APP_URL.includes("AQUI")) return;
        
        const name = localStorage.getItem('attendeeName') || 'Anónimo';
        
        // Obtener los nombres de las empresas que ya selló
        const stampedNames = companies
            .filter(c => stampedCompanies.includes(c.id))
            .map(c => c.name)
            .join(", ");

        document.getElementById('syncStatus').innerText = "Sincronizando progreso...";

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: USER_ID,
                name: name,
                stamps: stampedNames || "Ninguno todavía"
            })
        }).then(() => {
            document.getElementById('syncStatus').innerText = "✓ Progreso guardado en la nube";
        }).catch(err => {
            console.error(err);
            document.getElementById('syncStatus').innerText = "Modo offline (Guardado local)";
        });
    }

    function resetPassport() {
        if (confirm("¿Seguro que deseas borrar todos tus sellos?")) {
            stampedCompanies = [];
            localStorage.removeItem('stampedCompanies');
            renderPassport();
            syncDataWithCloud();
        }
    }

    renderPassport();
    // Forzar una sincronización inicial por si ya tenía datos guardados localmente
    if(localStorage.getItem('attendeeName')) { syncDataWithCloud(); }
</script>

</body>
</html>
